<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Índice Perplexity – GitHub Pages + JSONBin</title>
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #fbfbf9;
      --surface-2: #f0eee8;
      --border: #d8d4cb;
      --text: #25221c;
      --muted: #6f6a62;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --success: #2f7a3e;
      --warning: #a6681e;
      --danger: #a13544;
      --shadow: 0 10px 28px rgba(0,0,0,.07);
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 18px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }

    .app {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
    }

    .shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fcfcfa 0%, #f8f7f3 100%);
    }

    .title-wrap h1 {
      margin: 0 0 6px 0;
      font-size: 24px;
      line-height: 1.1;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .content {
      padding: 14px 16px 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 12px;
    }

    .stat__label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .stat__value {
      font-size: 20px;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .form-control, .btn, select, input, textarea {
      font: inherit;
    }

    .form-control {
      width: 100%;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
    }

    textarea.form-control {
      min-height: 86px;
      resize: vertical;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn--primary { background: var(--primary); color: #fff; }
    .btn--primary:hover { background: var(--primary-hover); }
    .btn--ghost { background: var(--surface-2); color: var(--text); }
    .btn--ghost:hover { background: #e7e2d7; }
    .btn--danger { background: #f6e3e6; color: var(--danger); }
    .btn--sm { padding: 6px 10px; font-size: 12px; }

    .settings-panel {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface);
      overflow: hidden;
    }

    .settings-summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 600;
      user-select: none;
    }

    .settings-summary::-webkit-details-marker { display: none; }
    .settings-summary::after {
      content: '▾';
      float: right;
      color: var(--muted);
    }
    .settings-panel[open] .settings-summary::after { content: '▴'; }

    .settings-body {
      padding: 0 12px 12px 12px;
      border-top: 1px solid var(--border);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .settings-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .status[data-type="ok"] { color: var(--success); }
    .status[data-type="warn"] { color: var(--warning); }
    .status[data-type="err"] { color: var(--danger); }

    .list {
      display: grid;
      gap: 8px;
    }

    .entry-card {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: #fff;
    }

    .entry-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .entry-main {
      min-width: 0;
      flex: 1;
    }

    .entry-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
      margin-bottom: 4px;
    }

    .entry-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .entry-title:hover { color: var(--primary); }

    .entry-badge,
    .entry-updated,
    .entry-parent,
    .entry-tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface-2);
      white-space: nowrap;
    }

    .entry-description {
      font-size: 13px;
      line-height: 1.35;
      color: var(--text);
      margin-top: 4px;
    }

    .entry-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .entry-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      text-align: center;
      color: var(--muted);
      background: #fff;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal-backdrop.is-open { display: flex; }

    .modal {
      width: min(700px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .modal__header,
    .modal__footer {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal__footer {
      border-top: 1px solid var(--border);
      border-bottom: 0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .modal__body { padding: 14px 16px; }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-grid .full { grid-column: 1 / -1; }

    @media (max-width: 860px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .controls { grid-template-columns: 1fr 1fr; }
      .settings-grid, .modal-grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
      .entry-top { flex-direction: column; }
      .entry-actions { justify-content: flex-start; }
    }

    @media (max-width: 560px) {
      .app { padding: 10px; }
      .content, .topbar { padding: 12px; }
      .stats, .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar">
        <div class="title-wrap">
          <h1>Índice Perplexity</h1>
          <p>Catálogo compacto de Espacios e Hilos con sincronización entre equipos mediante JSONBin.</p>
        </div>
        <div class="toolbar">
          <button id="addBtn" class="btn btn--primary">+ Agregar</button>
          <button id="importBtn" class="btn btn--ghost">Importar JSON</button>
          <button id="exportBtn" class="btn btn--ghost">Exportar JSON</button>
        </div>
      </header>

      <main class="content">
        <details class="settings-panel">
          <summary class="settings-summary">Ajustes</summary>
          <div class="settings-body">
            <div class="settings-grid">
              <div>
                <label class="label" for="binId">Bin ID</label>
                <input id="binId" class="form-control" type="text" placeholder="Ej: 6879d25dad19ca34f894e486">
              </div>
              <div>
                <label class="label" for="accessKey">X-Access-Key</label>
                <input id="accessKey" class="form-control" type="password" placeholder="Pega aquí tu access key">
              </div>
            </div>
            <div class="settings-actions">
              <button id="pullBtn" class="btn btn--ghost">Descargar</button>
              <button id="pushBtn" class="btn btn--primary">Subir</button>
              <button id="saveLocalBtn" class="btn btn--ghost">Guardar local</button>
            </div>
            <div id="syncStatus" class="status" data-type="ok">Listo</div>
          </div>
        </details>

        <section class="stats">
          <div class="stat"><span class="stat__label">Entradas</span><span id="statEntries" class="stat__value">0</span></div>
          <div class="stat"><span class="stat__label">Espacios</span><span id="statSpaces" class="stat__value">0</span></div>
          <div class="stat"><span class="stat__label">Hilos</span><span id="statThreads" class="stat__value">0</span></div>
          <div class="stat"><span class="stat__label">Etiquetas</span><span id="statTags" class="stat__value">0</span></div>
        </section>

        <section class="controls">
          <input id="search" class="form-control" type="search" placeholder="Buscar por título, descripción, etiqueta o espacio padre">
          <select id="typeFilter" class="form-control">
            <option value="all">Todos</option>
            <option value="space">Espacios</option>
            <option value="thread">Hilos</option>
          </select>
          <select id="tagFilter" class="form-control">
            <option value="all">Todas las etiquetas</option>
          </select>
          <select id="sortBy" class="form-control">
            <option value="updated-desc">Actualización: más recientes</option>
            <option value="updated-asc">Actualización: más antiguas</option>
            <option value="title-asc">Título: A-Z</option>
            <option value="title-desc">Título: Z-A</option>
          </select>
        </section>

        <section id="entriesList" class="list"></section>
      </main>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__header">
        <strong id="modalTitle">Nueva entrada</strong>
      </div>
      <div class="modal__body">
        <form id="entryForm">
          <input id="entryId" type="hidden">
          <div class="modal-grid">
            <div>
              <label class="label" for="entryType">Tipo</label>
              <select id="entryType" class="form-control">
                <option value="space">Espacio</option>
                <option value="thread">Hilo</option>
              </select>
            </div>
            <div>
              <label class="label" for="entryParentSpace">Espacio padre</label>
              <input id="entryParentSpace" class="form-control" type="text" placeholder="Solo para hilos o agrupación manual">
            </div>
            <div class="full">
              <label class="label" for="entryTitle">Título</label>
              <input id="entryTitle" class="form-control" type="text" required>
            </div>
            <div class="full">
              <label class="label" for="entryUrl">Enlace Perplexity</label>
              <input id="entryUrl" class="form-control" type="url" placeholder="https://www.perplexity.ai/...">
            </div>
            <div class="full">
              <label class="label" for="entryDescription">Descripción</label>
              <textarea id="entryDescription" class="form-control" placeholder="Resumen breve para recordar el contenido"></textarea>
            </div>
            <div class="full">
              <label class="label" for="entryTags">Etiquetas</label>
              <input id="entryTags" class="form-control" type="text" placeholder="separadas, por, comas">
            </div>
          </div>
        </form>
      </div>
      <div class="modal__footer">
        <button id="cancelBtn" class="btn btn--ghost" type="button">Cancelar</button>
        <button id="saveEntryBtn" class="btn btn--primary" type="submit" form="entryForm">Guardar</button>
      </div>
    </div>
  </div>

  <input id="fileInput" type="file" accept="application/json" hidden>

  <script>
    const STORAGE_KEY = 'perplexity-index-local-v2';
    const SETTINGS_KEY = 'perplexity-index-settings-v2';
    let entries = [];

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function uid() {
      return 'id-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function toast(message) {
      console.log(message);
    }

    function updateStatus(message, type = 'ok') {
      const el = $('syncStatus');
      el.textContent = message;
      el.dataset.type = type;
    }

    function entryTypeLabel(type) {
      return type === 'thread' ? 'Hilo' : 'Espacio';
    }

    function formatUpdatedAt(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString('es-ES', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function buildPayload() {
      return {
        app: 'perplexity-index',
        storage: 'jsonbin',
        version: 1,
        updatedAt: new Date().toISOString(),
        entries
      };
    }

    function saveSettingsAndLocal(saveSettings = true) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        if (saveSettings) {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify({
            binId: $('binId').value.trim(),
            accessKey: $('accessKey').value.trim()
          }));
        }
      } catch (err) {
        console.error(err);
      }
    }

    function loadSettingsAndLocal() {
      try {
        const rawEntries = localStorage.getItem(STORAGE_KEY);
        entries = rawEntries ? JSON.parse(rawEntries) : [];
      } catch {
        entries = [];
      }

      try {
        const rawSettings = localStorage.getItem(SETTINGS_KEY);
        const settings = rawSettings ? JSON.parse(rawSettings) : {};
        $('binId').value = settings.binId || '';
        $('accessKey').value = settings.accessKey || '';
      } catch {
        $('binId').value = '';
        $('accessKey').value = '';
      }
    }

    function mergeEntries(base, incoming) {
      const map = new Map(base.map(e => [e.id, e]));
      incoming.forEach(item => {
        const prev = map.get(item.id);
        if (!prev) {
          map.set(item.id, item);
        } else {
          const a = new Date(prev.updatedAt || prev.createdAt || 0).getTime();
          const b = new Date(item.updatedAt || item.createdAt || 0).getTime();
          if (b >= a) map.set(item.id, item);
        }
      });
      return [...map.values()];
    }

    function jsonbinHeaders() {
      const accessKey = $('accessKey').value.trim();
      if (!accessKey) throw new Error('Falta X-Access-Key');
      return {
        'Content-Type': 'application/json',
        'X-Access-Key': accessKey
      };
    }

    function jsonbinUrlLatest() {
      const binId = $('binId').value.trim();
      if (!binId) throw new Error('Falta Bin ID');
      return `https://api.jsonbin.io/v3/b/${binId}/latest?ts=${Date.now()}`;
    }

    function jsonbinUrlBase() {
      const binId = $('binId').value.trim();
      if (!binId) throw new Error('Falta Bin ID');
      return `https://api.jsonbin.io/v3/b/${binId}`;
    }

    function normalizeRemotePayload(data) {
      const record = data?.record || data || {};
      return {
        app: record.app || 'perplexity-index',
        storage: record.storage || 'jsonbin',
        version: Number.isFinite(record.version) ? record.version : 1,
        updatedAt: record.updatedAt || new Date().toISOString(),
        entries: Array.isArray(record.entries) ? record.entries : []
      };
    }

    async function readRemotePayload() {
      const res = await fetch(jsonbinUrlLatest(), {
        method: 'GET',
        headers: jsonbinHeaders(),
        cache: 'no-store'
      });
      if (!res.ok) throw new Error('GET ' + res.status);
      const data = await res.json();
      return normalizeRemotePayload(data);
    }

    async function pullJsonbin() {
      try {
        updateStatus('Descargando desde JSONBin...', 'warn');
        const remote = await readRemotePayload();
        entries = Array.isArray(remote.entries) ? remote.entries : [];
        saveSettingsAndLocal(true);
        render();
        updateStatus(`Descarga correcta: ${entries.length} entradas remotas`, 'ok');
        toast(`Datos descargados (${entries.length})`);
      } catch (err) {
        console.error(err);
        updateStatus('Error al descargar', 'err');
        toast('No se pudo descargar desde JSONBin');
      }
    }

    async function pushJsonbin() {
      try {
        updateStatus('Subiendo a JSONBin...', 'warn');

        const payload = buildPayload();
        payload.updatedAt = new Date().toISOString();
        payload.entries = Array.isArray(entries) ? entries.map(e => ({
          id: e.id,
          createdAt: e.createdAt || new Date().toISOString(),
          updatedAt: e.updatedAt || e.createdAt || new Date().toISOString(),
          type: e.type || 'space',
          parentSpace: e.parentSpace || '',
          title: e.title || '',
          url: e.url || '',
          description: e.description || '',
          tags: Array.isArray(e.tags) ? e.tags : []
        })) : [];

        const localCount = payload.entries.length;

        const res = await fetch(jsonbinUrlBase(), {
          method: 'PUT',
          headers: {
            ...jsonbinHeaders(),
            'X-Bin-Versioning': 'false'
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('PUT ' + res.status);

        const remote = await readRemotePayload();
        const remoteCount = Array.isArray(remote.entries) ? remote.entries.length : 0;

        if (remoteCount !== localCount) {
          throw new Error(`Verificación falló: local=${localCount}, remoto=${remoteCount}`);
        }

        entries = remote.entries;
        saveSettingsAndLocal(true);
        render();

        updateStatus(`Subida correcta: ${remoteCount} entradas verificadas`, 'ok');
        toast(`Datos subidos (${remoteCount})`);
      } catch (err) {
        console.error(err);
        updateStatus('Error al subir', 'err');
        toast(err.message || 'No se pudo subir a JSONBin');
      }
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(buildPayload(), null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `perplexity-index-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importJson() {
      $('fileInput').click();
    }

    function populateTagFilter() {
      const current = $('tagFilter').value || 'all';
      const tags = [...new Set(entries.flatMap(e => Array.isArray(e.tags) ? e.tags : []))].sort((a, b) => a.localeCompare(b, 'es'));
      $('tagFilter').innerHTML = `<option value="all">Todas las etiquetas</option>${tags.map(tag => `<option value="${escapeAttr(tag)}">${escapeHtml(tag)}</option>`).join('')}`;
      $('tagFilter').value = tags.includes(current) ? current : 'all';
    }

    function renderStats() {
      const spaces = entries.filter(e => (e.type || 'space') === 'space').length;
      const threads = entries.filter(e => e.type === 'thread').length;
      const tags = new Set(entries.flatMap(e => Array.isArray(e.tags) ? e.tags : []));

      $('statEntries').textContent = String(entries.length);
      $('statSpaces').textContent = String(spaces);
      $('statThreads').textContent = String(threads);
      $('statTags').textContent = String(tags.size);
    }

    function getFilteredEntries() {
      const q = $('search').value.trim().toLowerCase();
      const type = $('typeFilter').value;
      const tag = $('tagFilter').value;
      const sortBy = $('sortBy').value;

      let data = [...entries];

      if (type !== 'all') data = data.filter(e => (e.type || 'space') === type);
      if (tag !== 'all') data = data.filter(e => Array.isArray(e.tags) && e.tags.includes(tag));
      if (q) {
        data = data.filter(e => {
          const hay = [e.title, e.description, e.parentSpace, ...(Array.isArray(e.tags) ? e.tags : [])]
            .join(' ')
            .toLowerCase();
          return hay.includes(q);
        });
      }

      data.sort((a, b) => {
        if (sortBy === 'title-asc') return (a.title || '').localeCompare(b.title || '', 'es');
        if (sortBy === 'title-desc') return (b.title || '').localeCompare(a.title || '', 'es');

        const aDate = new Date(a.updatedAt || a.createdAt || 0).getTime();
        const bDate = new Date(b.updatedAt || b.createdAt || 0).getTime();
        if (sortBy === 'updated-asc') return aDate - bDate;
        return bDate - aDate;
      });

      return data;
    }

    function renderEntries() {
      const data = getFilteredEntries();
      const list = $('entriesList');

      if (!data.length) {
        list.innerHTML = `<div class="empty">No hay entradas que coincidan con los filtros.</div>`;
        return;
      }

      list.innerHTML = data.map(entry => {
        const typeLabel = entryTypeLabel(entry.type);
        const updated = formatUpdatedAt(entry.updatedAt || entry.createdAt);
        const parent = entry.parentSpace ? `<span class="entry-parent">${escapeHtml(entry.parentSpace)}</span>` : '';
        const description = entry.description ? `<div class="entry-description">${escapeHtml(entry.description)}</div>` : '';
        const tags = Array.isArray(entry.tags) && entry.tags.length
          ? `<div class="entry-tags">${entry.tags.map(tag => `<span class="entry-tag">${escapeHtml(tag)}</span>`).join('')}</div>`
          : '';
        const openButton = entry.url
          ? `<a class="btn btn--ghost btn--sm" href="${escapeAttr(entry.url)}" target="_blank" rel="noopener noreferrer">Abrir en Perplexity</a>`
          : '';

        return `
          <article class="entry-card">
            <div class="entry-top">
              <div class="entry-main">
                <div class="entry-title-row">
                  <span class="entry-title">${escapeHtml(entry.title || 'Sin título')}</span>
                  <span class="entry-badge">${typeLabel}</span>
                  ${updated ? `<span class="entry-updated">Actualizado: ${escapeHtml(updated)}</span>` : ''}
                  ${parent}
                </div>
                ${description}
                ${tags}
              </div>
              <div class="entry-actions">
                ${openButton}
                <button class="btn btn--ghost btn--sm" type="button" onclick="editEntry('${escapeAttr(entry.id)}')">Editar</button>
                <button class="btn btn--danger btn--sm" type="button" onclick="deleteEntry('${escapeAttr(entry.id)}')">Eliminar</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function render() {
      populateTagFilter();
      renderStats();
      renderEntries();
    }

    function openModal(entry = null) {
      $('entryForm').reset();
      $('entryId').value = entry?.id || '';
      $('entryType').value = entry?.type || 'space';
      $('entryParentSpace').value = entry?.parentSpace || '';
      $('entryTitle').value = entry?.title || '';
      $('entryUrl').value = entry?.url || '';
      $('entryDescription').value = entry?.description || '';
      $('entryTags').value = Array.isArray(entry?.tags) ? entry.tags.join(', ') : '';
      $('modalTitle').textContent = entry ? 'Editar entrada' : 'Nueva entrada';
      $('modalBackdrop').classList.add('is-open');
      $('modalBackdrop').setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      $('modalBackdrop').classList.remove('is-open');
      $('modalBackdrop').setAttribute('aria-hidden', 'true');
    }

    function editEntry(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      openModal(entry);
    }

    function deleteEntry(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      const ok = window.confirm(`¿Eliminar la entrada "${entry.title}"?`);
      if (!ok) return;
      entries = entries.filter(e => e.id !== id);
      saveSettingsAndLocal(false);
      render();
    }

    $('entryForm').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const id = $('entryId').value || uid();
      const existing = entries.find(e => e.id === id);
      const now = new Date().toISOString();

      const record = {
        id,
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        type: $('entryType').value,
        parentSpace: $('entryParentSpace').value.trim(),
        title: $('entryTitle').value.trim(),
        url: $('entryUrl').value.trim(),
        description: $('entryDescription').value.trim(),
        tags: $('entryTags').value.split(',').map(s => s.trim()).filter(Boolean)
      };

      if (!record.title) return;

      const idx = entries.findIndex(e => e.id === id);
      if (idx >= 0) entries[idx] = record;
      else entries.unshift(record);

      saveSettingsAndLocal(false);
      render();
      closeModal();
    });

    $('fileInput').addEventListener('change', (ev) => {
      const file = ev.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const imported = Array.isArray(data) ? data : (Array.isArray(data.entries) ? data.entries : []);
          entries = mergeEntries(entries, imported);
          saveSettingsAndLocal(true);
          render();
          toast('Archivo importado');
        } catch {
          toast('No se pudo importar el archivo');
        }
      };
      reader.readAsText(file);
      ev.target.value = '';
    });

    $('addBtn').addEventListener('click', () => openModal());
    $('cancelBtn').addEventListener('click', closeModal);
    $('exportBtn').addEventListener('click', exportJson);
    $('importBtn').addEventListener('click', importJson);
    $('pullBtn').addEventListener('click', pullJsonbin);
    $('pushBtn').addEventListener('click', pushJsonbin);
    $('saveLocalBtn').addEventListener('click', () => saveSettingsAndLocal(true));
    ['search','typeFilter','tagFilter','sortBy'].forEach(id => {
      $(id).addEventListener('input', render);
      $(id).addEventListener('change', render);
    });
    ['binId','accessKey'].forEach(id => $(id).addEventListener('change', () => saveSettingsAndLocal(true)));

    window.editEntry = editEntry;
    window.deleteEntry = deleteEntry;

    loadSettingsAndLocal();
    render();
    updateStatus('Listo', 'ok');
  </script>
</body>
</html>
